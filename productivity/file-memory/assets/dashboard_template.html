<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI File Memory Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a2332;
    --surface: #1e2d42;
    --surface-2: #243550;
    --border: rgba(255,255,255,0.08);
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #0891b2;
    --accent-dim: rgba(8,145,178,0.15);
    --green: #10b981;
    --amber: #f59e0b;
    --red: #ef4444;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
    --body: 'IBM Plex Sans', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--body); font-size: 14px; line-height: 1.6; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 1.1rem; font-weight: 600; color: var(--text); }
  .header .project { font-family: var(--mono); font-size: 0.8rem; color: var(--accent); margin-top: 2px; }
  .kpi-row { display: flex; gap: 16px; }
  .kpi { background: var(--accent-dim); border: 1px solid var(--accent); border-radius: 6px; padding: 8px 16px; text-align: center; min-width: 100px; }
  .kpi-val { font-family: var(--mono); font-size: 1.4rem; font-weight: 500; color: var(--accent); display: block; }
  .kpi-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .main { max-width: 1200px; margin: 0 auto; padding: 28px 32px; display: grid; gap: 28px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .panel-title { padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 0.85rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; display: flex; align-items: center; gap: 8px; }
  .panel-title .count { background: var(--surface-2); border-radius: 10px; padding: 2px 8px; font-size: 0.75rem; color: var(--accent); font-family: var(--mono); }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 16px; text-align: left; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; background: var(--surface-2); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: var(--accent); }
  td { padding: 10px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .path { font-family: var(--mono); font-size: 0.8rem; color: var(--text); }
  .summary-cell { font-size: 0.82rem; color: var(--text-dim); max-width: 340px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .badge-high { background: rgba(8,145,178,0.2); color: var(--accent); border: 1px solid rgba(8,145,178,0.3); }
  .badge-normal { background: rgba(148,163,184,0.1); color: var(--text-dim); border: 1px solid var(--border); }
  .badge-low { background: rgba(100,116,139,0.1); color: #64748b; border: 1px solid rgba(100,116,139,0.2); }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { background: var(--surface-2); color: var(--text-dim); padding: 1px 7px; border-radius: 3px; font-size: 0.7rem; font-family: var(--mono); }
  .tag-more { color: var(--accent); font-size: 0.7rem; }
  .expand-row { display: none; }
  .expand-row td { padding: 0; background: var(--surface-2); }
  .expand-inner { padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .expand-inner h4 { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .history-item { font-size: 0.8rem; color: var(--text-dim); padding: 4px 0; border-bottom: 1px solid var(--border); }
  .history-item:last-child { border-bottom: none; }
  .history-date { font-family: var(--mono); font-size: 0.72rem; color: var(--accent); }
  details summary { padding: 14px 20px; cursor: pointer; list-style: none; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  details summary::-webkit-details-marker { display: none; }
  details[open] summary { background: var(--surface-2); }
  .sess-goal { font-size: 0.85rem; color: var(--text); flex: 1; }
  .sess-meta { font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim); display: flex; gap: 16px; }
  .sess-body { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .sess-section { margin-bottom: 12px; }
  .sess-section h4 { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .sess-file { font-family: var(--mono); font-size: 0.78rem; color: var(--text-dim); padding: 2px 0; }
  .sess-decision { font-size: 0.8rem; color: var(--text-dim); padding: 4px 0; }
  .sess-outcome { font-size: 0.8rem; color: var(--green); padding: 2px 0; }
  .sess-outcome::before { content: "✓ "; }
  .tag-cloud { padding: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .cloud-tag { color: var(--text-dim); cursor: default; transition: color 0.15s; }
  .cloud-tag:hover { color: var(--text); }
  .cloud-tag-top { color: var(--accent); }
  .sparkline-wrap { padding: 20px; }
  .sparkline-label { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; }
  svg.sparkline { width: 100%; height: 60px; }
  .spark-dot { fill: var(--accent); }
  .no-data { padding: 32px; text-align: center; color: var(--text-dim); font-size: 0.9rem; }
  @media (max-width: 768px) {
    .kpi-row { flex-wrap: wrap; }
    .header { flex-direction: column; align-items: flex-start; gap: 16px; }
    .expand-inner { grid-template-columns: 1fr; }
    .main { padding: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header h1" id="dash-title">AI File Memory Dashboard</div>
    <div class="project" id="dash-project"></div>
  </div>
  <div class="kpi-row" id="kpi-row"></div>
</div>

<div class="main">
  <div class="panel" id="panel-files">
    <div class="panel-title">File Memory <span class="count" id="files-count">0</span></div>
    <table id="files-table">
      <thead>
        <tr>
          <th onclick="sortTable('path')">Path ↕</th>
          <th onclick="sortTable('importance')">Importance ↕</th>
          <th onclick="sortTable('last_seen')">Last Seen ↕</th>
          <th>Tags</th>
          <th>Summary</th>
        </tr>
      </thead>
      <tbody id="files-body"></tbody>
    </table>
  </div>

  <div class="panel" id="panel-sessions">
    <div class="panel-title">Session History <span class="count" id="sessions-count">0</span></div>
    <div id="sessions-list"></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:28px;">
    <div class="panel">
      <div class="panel-title">Tag Cloud</div>
      <div class="tag-cloud" id="tag-cloud"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Activity (files/session)</div>
      <div class="sparkline-wrap" id="sparkline-wrap"></div>
    </div>
  </div>
</div>

<script>
// DATA_INJECTION_POINT — replaced by dashboard_builder.py
const MEMORY_DATA = {"files":[],"sessions":[],"project_root":"","file_count":0,"session_count":0};

function relTime(iso) {
  if (!iso) return "—";
  const d = new Date(iso), now = new Date();
  const s = Math.round((now - d) / 1000);
  if (s < 60) return "just now";
  if (s < 3600) return Math.floor(s/60) + "m ago";
  if (s < 86400) return Math.floor(s/3600) + "h ago";
  if (s < 86400*7) return Math.floor(s/86400) + "d ago";
  return d.toLocaleDateString();
}

function dur(s, e) {
  if (!s || !e) return "ongoing";
  const sec = Math.round((new Date(e) - new Date(s)) / 1000);
  return `${Math.floor(sec/60)}m ${sec%60}s`;
}

function renderKPIs() {
  const d = MEMORY_DATA;
  const most_active = (d.files || []).sort((a,b) => (b.session_count||0)-(a.session_count||0))[0];
  const kpis = [
    {val: d.file_count || (d.files||[]).length, label: "Files Remembered"},
    {val: d.session_count || (d.sessions||[]).length, label: "Sessions Logged"},
    {val: most_active ? most_active.path.split("/").pop() : "—", label: "Most Active"},
  ];
  document.getElementById("kpi-row").innerHTML = kpis.map(k =>
    `<div class="kpi"><span class="kpi-val">${k.val}</span><span class="kpi-label">${k.label}</span></div>`
  ).join("");
  document.getElementById("dash-project").textContent = d.project_root || "";
}

let sortKey = "last_seen", sortDir = -1;
function sortTable(key) {
  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = -1; }
  renderFiles();
}

function renderFiles() {
  const files = [...(MEMORY_DATA.files || [])];
  files.sort((a, b) => {
    let av = a[sortKey] || "", bv = b[sortKey] || "";
    if (sortKey === "importance") { const o = {high:0,normal:1,low:2}; av = o[av]||1; bv = o[bv]||1; }
    return av < bv ? sortDir : av > bv ? -sortDir : 0;
  });
  document.getElementById("files-count").textContent = files.length;
  const tbody = document.getElementById("files-body");
  tbody.innerHTML = files.map((f, i) => {
    const tags = (f.tags || f.tag_summary || []);
    const visible = tags.slice(0,3).map(t=>`<span class="tag">${t}</span>`).join(" ");
    const more = tags.length > 3 ? `<span class="tag-more">+${tags.length-3}</span>` : "";
    const badge = `<span class="badge badge-${f.importance||'normal'}">${f.importance||'normal'}</span>`;
    const summary = (f.summary||f.label||"").slice(0,70) + ((f.summary||"").length>70?"…":"");
    const hist = (f.change_history||[]).slice(-5).reverse().map(h=>
      `<div class="history-item"><span class="history-date">${(h.timestamp||"").slice(0,10)}</span> — ${h.change_type}: ${h.description}</div>`
    ).join("") || "<span style='color:#64748b;font-size:0.78rem'>No changes recorded yet</span>";
    const notes = (f.notes||[]).slice(-5).reverse().map(n=>
      `<div class="history-item"><span class="history-date">${(n.timestamp||"").slice(0,10)}</span> ${n.note}</div>`
    ).join("") || "<span style='color:#64748b;font-size:0.78rem'>No notes yet</span>";
    return `
      <tr onclick="toggleRow(${i})" style="cursor:pointer">
        <td><span class="path">${f.path}</span></td>
        <td>${badge}</td>
        <td style="font-family:var(--mono);font-size:0.78rem;white-space:nowrap">${relTime(f.last_seen)}</td>
        <td><div class="tags">${visible}${more}</div></td>
        <td class="summary-cell">${summary}</td>
      </tr>
      <tr class="expand-row" id="expand-${i}">
        <td colspan="5"><div class="expand-inner">
          <div><h4>Change History</h4>${hist}</div>
          <div><h4>Notes</h4>${notes}</div>
        </div></td>
      </tr>`;
  }).join("");
}

function toggleRow(i) {
  const row = document.getElementById(`expand-${i}`);
  row.style.display = row.style.display === "table-row" ? "none" : "table-row";
}

function renderSessions() {
  const sessions = (MEMORY_DATA.sessions || []).slice(0, 10);
  document.getElementById("sessions-count").textContent = sessions.length;
  document.getElementById("sessions-list").innerHTML = sessions.map(s => {
    const files = (s.files_touched||[]).map(f=>`<div class="sess-file">${f.action} — ${f.path}</div>`).join("");
    const decisions = (s.decisions||[]).map(d=>`<div class="sess-decision"><strong>${d.decision}</strong>: ${d.rationale}</div>`).join("");
    const outcomes = (s.outcomes||[]).map(o=>`<div class="sess-outcome">${o}</div>`).join("");
    return `<details>
      <summary>
        <span class="sess-goal">${s.goal||s.session_id}</span>
        <span class="sess-meta">
          <span>${(s.session_id||"").slice(0,18)}</span>
          <span>${dur(s.started_at,s.ended_at)}</span>
          <span>${(s.files_touched||[]).length} files</span>
        </span>
      </summary>
      <div class="sess-body">
        ${files ? `<div class="sess-section"><h4>Files Touched</h4>${files}</div>` : ""}
        ${decisions ? `<div class="sess-section"><h4>Decisions</h4>${decisions}</div>` : ""}
        ${outcomes ? `<div class="sess-section"><h4>Outcomes</h4>${outcomes}</div>` : ""}
      </div>
    </details>`;
  }).join("") || `<div class="no-data">No sessions recorded yet</div>`;
}

function renderTagCloud() {
  const freq = {};
  (MEMORY_DATA.files||[]).forEach(f => {
    (f.tags||f.tag_summary||[]).forEach(t => { freq[t] = (freq[t]||0)+1; });
  });
  const tags = Object.entries(freq).sort((a,b)=>b[1]-a[1]);
  if (!tags.length) { document.getElementById("tag-cloud").innerHTML = `<span style="color:#64748b">No tags yet</span>`; return; }
  const max = tags[0][1], top5 = new Set(tags.slice(0,5).map(t=>t[0]));
  document.getElementById("tag-cloud").innerHTML = tags.map(([t,c]) => {
    const size = 0.75 + (c/max) * 0.75;
    const cls = top5.has(t) ? "cloud-tag cloud-tag-top" : "cloud-tag";
    return `<span class="${cls}" style="font-size:${size}rem">${t} <sup style="font-size:0.6rem">${c}</sup></span>`;
  }).join("");
}

function renderSparkline() {
  const sessions = (MEMORY_DATA.sessions||[]).slice(0,10).reverse();
  if (sessions.length < 2) { document.getElementById("sparkline-wrap").innerHTML = `<div class="no-data">Need 2+ sessions for sparkline</div>`; return; }
  const counts = sessions.map(s=>(s.files_touched||[]).length);
  const maxC = Math.max(...counts, 1);
  const w = 600, h = 50, pad = 8;
  const pts = counts.map((c,i) => {
    const x = pad + (i/(counts.length-1))*(w-pad*2);
    const y = pad + ((maxC-c)/maxC)*(h-pad*2);
    return `${x},${y}`;
  }).join(" ");
  const dots = counts.map((c,i) => {
    const x = pad + (i/(counts.length-1))*(w-pad*2);
    const y = pad + ((maxC-c)/maxC)*(h-pad*2);
    return `<circle cx="${x}" cy="${y}" r="3" class="spark-dot"/>`;
  }).join("");
  document.getElementById("sparkline-wrap").innerHTML = `
    <div class="sparkline-label">Files touched per session (last ${counts.length})</div>
    <svg class="sparkline" viewBox="0 0 ${w} ${h}">
      <polyline fill="none" stroke="#0891b2" stroke-width="2" points="${pts}"/>
      ${dots}
    </svg>`;
}

function init() {
  renderKPIs();
  renderFiles();
  renderSessions();
  renderTagCloud();
  renderSparkline();
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
