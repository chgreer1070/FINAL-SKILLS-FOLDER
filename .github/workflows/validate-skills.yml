name: Validate skills

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build .skill packages from source directories
        run: python scripts/build_skills.py

      - name: Validate .skill packages
        run: python scripts/validate_skills.py

      - name: Smoke-test .skill packages
        run: python scripts/smoke_test_skills.py
